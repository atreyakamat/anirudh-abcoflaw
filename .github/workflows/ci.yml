name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint (Frontend & Backend)
        run: npm run lint

      - name: Typecheck (Frontend & Backend)
        run: npm run typecheck

      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api/v1
          SUPABASE_JWT_SECRET: placeholder_secret_for_build
