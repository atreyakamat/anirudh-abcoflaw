version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: law_practice_crm_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: law_practice_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law_practice_network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: law_practice_crm_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/law_practice_crm?schema=public
      JWT_SECRET: dev-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: dev-refresh-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      CORS_ORIGINS: http://localhost:3000
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./shared/src:/app/shared/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - law_practice_network
    command: sh -c "cd backend && npx prisma db push && cd .. && npm run dev:backend"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: law_practice_crm_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./shared/src:/app/shared/src
    depends_on:
      - backend
    networks:
      - law_practice_network

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - law_practice_network

  waha:
    image: devlikeapro/waha
    container_name: waha
    ports:
      - "3002:3000"
    environment:
      - WAHA_LOG_LEVEL=info
    volumes:
      - waha_data:/app/.waha
    restart: unless-stopped
    networks:
      - law_practice_network

volumes:
  postgres_data:
  n8n_data:
  waha_data:

networks:
  law_practice_network:
    driver: bridge
