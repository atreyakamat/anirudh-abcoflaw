version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: law_crm_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-law_practice_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-law_practice_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - law_crm_network

  # Backend API (NestJS)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: law_crm_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../backend/.env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-law_practice_crm}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-law_practice_crm}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - law_crm_network

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
        - NEXT_PUBLIC_APP_URL=http://localhost:3000
    container_name: law_crm_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - law_crm_network

  # n8n Workflow Automation (Optional - uncomment if needed)
  # n8n:
  #   image: docker.n8n.io/n8nio/n8n:latest
  #   container_name: law_crm_n8n
  #   restart: unless-stopped
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     - N8N_HOST=localhost
  #     - N8N_PORT=5678
  #     - N8N_PROTOCOL=http
  #     - NODE_ENV=production
  #     - WEBHOOK_URL=http://localhost:5678/
  #     - GENERIC_TIMEZONE=Asia/Kolkata
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #     - ./n8n/workflows:/home/node/.n8n/workflows
  #   networks:
  #     - law_crm_network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  n8n_data:
    driver: local

networks:
  law_crm_network:
    driver: bridge