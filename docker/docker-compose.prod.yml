version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: law_crm_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-law_practice_crm}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-law_practice_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - law_crm_network

  # Backend API (NestJS)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV:-development}
    container_name: law_crm_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-law_practice_crm}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-law_practice_crm}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-32-characters-long-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-minimum-32-characters-long-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    volumes:
      - uploads:/app/uploads
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - law_crm_network

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV:-development}
        - NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
        - NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: law_crm_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - ../frontend/src:/app/src:ro
      - ../frontend/public:/app/public:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - law_crm_network

  # n8n Workflow Automation
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    container_name: law_crm_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Kolkata}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - law_crm_network

  # WAHA (WhatsApp API)
  waha:
    image: devlikeapro/waha:${WAHA_VERSION:-latest}
    container_name: law_crm_waha
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - WAHA_LOG_LEVEL=info
      - WAHA_SESSION_TIMEOUT=300
      - WAHA_RESTART_POLICY=true
    volumes:
      - waha_data:/app/.waha
      - ./waha/sessions:/app/sessions
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - law_crm_network

  # Nginx Proxy Manager (Reverse Proxy)
  nginx:
    image: jc21/nginx-proxy-manager:${NGINX_VERSION:-latest}
    container_name: law_crm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      - DB_MYSQL_HOST=nginx_db
      - DB_MYSQL_PORT=3306
      - DB_MYSQL_USER=npm
      - DB_MYSQL_PASSWORD=${NGINX_DB_PASSWORD:-npm123}
      - DB_MYSQL_NAME=nginx_proxy_manager
    volumes:
      - nginx_data:/data
      - nginx_letsencrypt:/etc/letsencrypt
    depends_on:
      - nginx_db
    networks:
      - law_crm_network

  # Nginx Database (for Nginx Proxy Manager)
  nginx_db:
    image: jc21/mariadb:${MARIADB_VERSION:-latest}
    container_name: law_crm_nginx_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${NGINX_DB_ROOT_PASSWORD:-rootnpm123}
      - MYSQL_DATABASE=nginx_proxy_manager
      - MYSQL_USER=npm
      - MYSQL_PASSWORD=${NGINX_DB_PASSWORD:-npm123}
    volumes:
      - nginx_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law_crm_network

  # Uptime Kuma (Monitoring)
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIME_VERSION:-latest}
    container_name: law_crm_uptime
    restart: unless-stopped
    ports:
      - "3030:3001"
    volumes:
      - uptime_kuma_data:/app/data
    environment:
      - UPTIME_KUMA_PORT=3001
    healthcheck:
      test: ["CMD", "node", "/app/server/server.js"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - law_crm_network

  # Portainer (Container Management)
  portainer:
    image: portainer/portainer-ce:${PORTAINER_VERSION:-latest}
    container_name: law_crm_portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    command: --http-enabled
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORTAINER_DATA_PATH=/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - law_crm_network

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  n8n_data:
    driver: local
  waha_data:
    driver: local
  nginx_data:
    driver: local
  nginx_letsencrypt:
    driver: local
  nginx_db_data:
    driver: local
  uptime_kuma_data:
    driver: local
  portainer_data:
    driver: local

networks:
  law_crm_network:
    driver: bridge
    name: law_crm_network