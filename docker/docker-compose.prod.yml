version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: law_practice_crm_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-law_practice_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law_practice_network
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: law_practice_crm_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-law_practice_crm}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - law_practice_network
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: law_practice_crm_frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - law_practice_network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
    driver: local

networks:
  law_practice_network:
    driver: bridge